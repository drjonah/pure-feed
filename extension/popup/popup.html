<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin: 0;
      color: #1a1a2e;
      background: #fff;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .row:last-child { border-bottom: none; }
    .label { font-weight: 500; }
    .sublabel { font-size: 12px; color: #888; margin-top: 2px; }
    /* Toggle switch */
    .switch { position: relative; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 22px;
      transition: .2s;
    }
    .slider:before {
      content: ""; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .2s;
    }
    input:checked + .slider { background: #4f46e5; }
    input:checked + .slider:before { transform: translateX(18px); }
    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 6px;
    }
    .dot-green { background: #22c55e; }
    .dot-yellow { background: #f59e0b; }
    .stat-num { font-size: 20px; font-weight: 700; color: #4f46e5; }
  </style>
</head>
<body>
  <h1>Pure Feed</h1>

  <div class="row">
    <div>
      <div class="label">Filter enabled</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <div>
      <div class="label">Model status</div>
    </div>
    <div id="modelStatus">
      <span class="status-dot dot-yellow"></span>Loading&hellip;
    </div>
  </div>

  <div class="row">
    <div>
      <div class="label">Filtered today</div>
      <div class="sublabel">across all platforms</div>
    </div>
    <div class="stat-num" id="filteredCount">&mdash;</div>
  </div>

  <div style="text-align: center; padding-top: 12px;">
    <button id="settingsBtn" style="
      padding: 8px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    ">Settings</button>
  </div>
</body>
<script src="popup.js"></script>
</html>
